<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>심리 Tusk 게임</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: 'Noto Sans KR', sans-serif;
      background-color: #111827; /* Tailwind bg-gray-900 */
    }
    .transition-transform {
      transition-property: transform;
    }
    .duration-300 {
      transition-duration: 300ms;
    }
    .transition-all {
      transition-property: all;
    }
    @keyframes shake {
      10%, 90% { transform: translate3d(-1px, 0, 0); }
      20%, 80% { transform: translate3d(2px, 0, 0); }
      30%, 50%, 70% { transform: translate3d(-4px, 0, 0); }
      40%, 60% { transform: translate3d(4px, 0, 0); }
    }
    .animate-shake {
      animation: shake 0.82s cubic-bezier(.36,.07,.19,.97) both;
    }

    @keyframes muzzle-flash {
      0% { opacity: 1; transform: scale(1.5); }
      100% { opacity: 0; transform: scale(0); }
    }
    .muzzle-flash-fx {
      animation: muzzle-flash 0.15s ease-out;
    }

    @keyframes shield-up {
      from { opacity: 0; transform: scale(0.5); }
      to { opacity: 1; transform: scale(1); }
    }
    .shield-up-fx {
      animation: shield-up 0.2s ease-out;
    }
    
    @keyframes heal-pulse {
      0% { transform: scale(1); opacity: 0.7; }
      50% { transform: scale(1.2); opacity: 1; }
      100% { transform: scale(1); opacity: 0.7; }
    }
    .heal-fx {
        animation: heal-pulse 0.8s ease-in-out infinite;
    }
    
    @keyframes fade-in-out {
      0% { opacity: 1; }
      50% { opacity: 0; }
      100% { opacity: 1; }
    }
    .animate-turn-transition {
      animation: fade-in-out 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="importmap">
  {
    "imports": {
      "react/": "https://aistudiocdn.com/react@^19.1.1/",
      "react": "https://aistudiocdn.com/react@^19.1.1",
      "@google/genai": "https://aistudiocdn.com/@google/genai@^1.20.0",
      "react-dom/": "https://aistudiocdn.com/react-dom@^19.1.1/",
      "lucide-react": "https://aistudiocdn.com/lucide-react@^0.544.0"
    }
  }
  </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
